<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>doom-shooter</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
      }
      #retry,
      #resume {
        display: none;
        position: absolute;
        left: 50%;
        top: 62%;
        transform: translateX(-50%);
        padding: 12px 32px;
        font: 24px monospace;
        color: #f5f5f5;
        background: #7a1518;
        border: 2px solid #f5f5f5;
        cursor: pointer;
      }
      #retry:hover,
      #resume:hover {
        background: #e5484d;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <button id="retry" type="button">TRY AGAIN</button>
    <button id="resume" type="button">RESUME</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
